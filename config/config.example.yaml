# Ubuntu Control Deck 設定例。config.yaml へコピーして使用する。
server:
  host: 127.0.0.1   # LAN 公開する場合のみ 0.0.0.0（Tailscale/WireGuard/HTTPS 推奨）
  port: 8765

security:
  session_timeout_minutes: 480
  allow_arbitrary_commands: false   # 任意コマンド実行は初期無効
  secure_cookies: false             # HTTPS リバースプロキシ配下では true
  require_totp_for_admin: false     # true で管理者に二要素認証を推奨（UI にバナー）
  require_totp_for_power: false     # true で再起動・停止・予約時にTOTP再認証を要求

files:
  allowed_roots: []   # 例: ["/home/USER"]（~/.ssh・~/.gnupg・DB・鍵は拒否リストで常に保護）
  max_upload_size_gb: 100
  trash_enabled: true
  trash_retention_days: 30
  trash_max_size_gb: 10

monitoring:
  interval_seconds: 2
  raw_retention_hours: 24
  minute_retention_days: 30
  hour_retention_days: 365
  # 電気代（Corsair HX1500i など corsair-psu hwmon 対応 PSU の DC 出力から概算）
  electricity:
    enabled: true
    price_per_kwh_yen: 35.69   # 電力単価
    psu_efficiency: 0.85       # PSU 効率（0.50〜1.00）。AC 入力電力の概算に使用
    persistence_interval_seconds: 600  # DB へのチェックポイント間隔（SSD 書込抑制。60〜3600）

logs:
  retention_days: 30
  rotate_size_mb: 100

remote_desktop:
  enabled: false          # true にすると deck.sh が guacd の導入を試みる
  guacd_host: 127.0.0.1
  guacd_port: 4822

ui:
  app_name: "Ubuntu Control Deck"
  accent_color: "#3b82f6"
  default_theme: system   # system / dark / light
  metric_refresh_seconds: 2

application_builder:
  # .NET 8 SDKのdotnet実行ファイル。未設定時はCONTROL_DECK_DOTNET、次にPATHを確認。
  # dotnet_path: /home/USER/.local/share/control-deck/sdks/dotnet-8.0.423/dotnet

applications:
  # Web UIにはIDとlabelだけを公開し、argvはリクエストから変更できません。
  # 実行ファイルは絶対パス、引数は固定値とし、password/token等を含めないでください。
  health_commands: {}
  # health_commands:
  #   my-app-self-check:
  #     label: My App self-check
  #     argv: ["/home/USER/bin/my-app", "health"]
  # system scopeのserviceは、ここで固定したID／unit／操作だけをroot所有catalogへ導入します。
  # Web APIから任意unit名を渡すことはできません。変更後は ./deck.sh service を再実行してください。
  system_services: {}
  # system_services:
  #   remote-desktop:
  #     label: Remote Desktop (xrdp)
  #     unit: xrdp.service
  #     actions: [start, stop, restart]

# data_dir: ~/.local/share/control-deck
